<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_LINK // ASCII</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="brand">ASCII_IMAGE_GENERATOR <span class="blink">_</span></div>
        <div class="stats">FPS: <span id="fps">60</span> | RES: 160x120</div>
    </div>

    <div class="side-hud">
        <div class="hud-card">
            <h3>SIGNAL_INPUT</h3>
            <div class="input-wrap">
                <label>INTENSITY</label>
                <input type="range" id="intensity" min="1" max="5" value="1.5" step="0.1">
            </div>
            <div class="input-wrap">
                <label>RESOLUTION</label>
                <input type="range" id="grain" min="5" max="25" value="10">
            </div>
        </div>

        <div class="hud-card">
            <h3>VISUAL_FILTER</h3>
            <div class="btn-grid" id="modeSelect">
                <button class="active" data-value="matrix">NEON</button>
                <button data-value="bw">GRAY</button>
                <button data-value="retro">GOLD</button>
                <button data-value="color">TRUE</button>
            </div>
        </div>

        <div class="hud-card">
            <h3>CHARACTER_SET</h3>
            <div class="btn-grid" id="charsetSelect">
                <button class="active" data-value="simple">DOT</button>
                <button data-value="complex">RAW</button>
                <button data-value="binary">BIN</button>
            </div>
        </div>

        <button id="saveBtn" class="action-btn">EXPORT_SNAPSHOT</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
